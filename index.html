<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>預購說明</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            /* 奶油粉色系變數 */
            --bg-cream: #FFF9EF;       /* 溫暖的奶油白背景 */
            --bg-sidebar: #FDF5F2;     /* 次要區塊或側邊欄的淡粉奶油色 */
            --primary-pink: #F4D3D3;   /* 主色：優雅的粉撲色 */
            --accent-pink: #fa8a8a;    /* 深一點的粉：用於 Hover 或重點 */
            --text-main: #5A4B41;      /* 溫暖的深咖啡色文字 */
            --text-muted: #8C7B70;     /* 輔助文字顏色 */
        }

        * { 
            box-sizing: border-box;
            margin: 0; padding: 0; 
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans TC", sans-serif;
            background-color: var(--bg-cream);
            color: var(--text-main);
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            overflow-x: hidden; /* 防止物理擺動產生水平捲軸 */
        }

        /* ==========================================================================
           🌸 緩慢飄落背景樣式 (Hourglass / Floating Particles)
           ========================================================================= */
        #falling-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            pointer-events: none; /* 讓滑鼠穿透，不影響點擊網頁內容 */
            z-index: -1;          /* 確保置於所有卡片與文字的底層 */
        }

        .particle {
            position: absolute;
            top: -60px; /* 從視窗上方外面開始掉落 */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            pointer-events: none;
            opacity: 0;
            animation: slowFall linear forwards;
        }

        @keyframes slowFall {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.65; /* 漸漸浮現，避免太突兀，維持背景柔和感 */
            }
            90% {
                opacity: 0.65;
            }
            100% {
                /* 掉落到視窗下方，並帶有隨機的左右物理飄移與旋轉 */
                transform: translateY(108vh) translateX(var(--drift-x)) rotate(var(--drift-rotate));
                opacity: 0;
            }
        }

        /* ==========================================================================
           主要卡片與內容樣式
           ========================================================================= */
        .main-card {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.93); /* 微透出背景的白底，質感升級 */
            backdrop-filter: blur(4px);            /* 讓卡片背後微模糊，提升閱讀舒適度 */
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(90, 75, 65, 0.04);
            position: relative;
            z-index: 1;
        }

        .header {
            padding-bottom: 30px;
            text-align: center;
            border-bottom: 1px solid var(--primary-pink);
            margin-bottom: 40px;
        }
        .header h2 { 
            font-size: 22px;
            font-weight: 700; 
            letter-spacing: 3px;
            margin-bottom: 10px;
            color: var(--text-main);
            text-transform: uppercase;
        }
        .header p { 
            font-size: 13px;
            color: var(--text-muted); 
            letter-spacing: 1px;
        }

        .section-padding { margin-bottom: 40px; }
        
        .flow-container {
            background-color: var(--bg-sidebar);
            padding: 30px;
            border-radius: 8px;
            border: 1px solid var(--primary-pink);
        }
        .flow-title {
            color: var(--text-main);
            font-size: 14px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        .flow-title i {
            color: var(--accent-pink);
        }
        .flow-item {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            font-size: 14px;
            padding-bottom: 12px;
            border-bottom: 1px dashed var(--primary-pink);
            align-items: flex-start;
        }
        .flow-step {
            font-weight: 700;
            color: var(--accent-pink);
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            line-height: 1;
            margin-top: 2px;
        }
        .flow-content {
            color: var(--text-main);
        }
        .flow-content strong { color: var(--accent-pink); }
        
        .flow-warn {
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #ffffff;
            padding: 15px;
            border-radius: 6px;
            border-left: 4px solid var(--accent-pink);
        }

        .accordion-container { margin-bottom: 10px; }
        
        .acc-item {
            border-bottom: 1px solid var(--primary-pink);
            transition: 0.3s;
        }
        .acc-trigger {
            width: 100%;
            padding: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-main);
            font-size: 15px;
            font-weight: 700;
            transition: color 0.2s;
        }
        .acc-trigger:hover {
            color: var(--accent-pink);
        }
        
        .acc-icon-wrap {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .icon-circle {
            width: 32px;
            height: 32px;
            background-color: var(--bg-sidebar);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-pink);
        }

        .acc-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 0;
        }
        .acc-content.active {
            max-height: 2000px;
            padding-bottom: 25px;
        }
        .acc-list {
            list-style: none;
            padding-left: 47px;
        }
        .acc-list li {
            font-size: 13.5px;
            margin-bottom: 10px;
            color: var(--text-main);
            position: relative;
            line-height: 1.7;
        }
        .acc-list li::before {
            content: "•";
            position: absolute;
            left: -15px;
            color: var(--accent-pink);
            font-size: 16px;
        }
        .acc-list li strong { color: var(--text-main); font-weight: 700; }
        
        .acc-list li small {
            display: block;
            color: var(--text-muted);
            margin-top: 6px;
            background: var(--bg-sidebar);
            padding: 12px;
            border-left: 3px solid var(--primary-pink);
            border-radius: 6px;
            line-height: 1.6;
        }

        /* 手機響應式微調 (RWD Mobile) */
        @media (max-width: 480px) {
            body { padding: 15px 10px; }
            .main-card { padding: 25px 15px; border-radius: 8px; }
            .header { padding-bottom: 20px; margin-bottom: 25px; }
            .header h2 { font-size: 18px; }
            .header p { font-size: 12px; }
            .flow-container { padding: 20px 15px; }
            .flow-title { font-size: 13px; margin-bottom: 15px; }
            .flow-item { font-size: 13px; padding-bottom: 10px; gap: 10px; }
            .flow-step { font-size: 14px; }
            .flow-warn { font-size: 12px; padding: 10px; }
            .acc-trigger { font-size: 14px; padding: 16px 0; }
            .acc-list { padding-left: 30px; }
            .acc-list li { font-size: 12.5px; margin-bottom: 8px; }
        }
    </style>
</head>
<body>

    <div id="falling-container"></div>

    <div class="main-card">
        <div class="header">
            <h2>SHOPPING GUIDE</h2>
            <p>韓國童裝預購說明</p>
        </div>

        <div class="section-padding">
            <div class="flow-container">
                <div class="flow-title">
                    <i data-lucide="clipboard-list" style="width:18px;height:18px"></i>
                    預購流程
                </div>
                <div class="flow-item">
                    <span class="flow-step">01</span>
                    <div class="flow-content">為保護買家資訊，官網<strong>僅有預購商品下單，沒有提供金流與物流</strong></div>
                </div>
                <div class="flow-item">
                    <span class="flow-step">02</span>
                    <div class="flow-content">購物車資訊請<strong>填寫 LINE 名稱</strong>，以便客服核對訂單資料</div>
                </div>
                <div class="flow-item">
                    <span class="flow-step">03</span>
                    <div class="flow-content">訂單成立後<strong>務必通知 LINE 官方</strong>，以加快處理訂單</div>
                </div>
                <div class="flow-item">
                    <span class="flow-step">04</span>
                    <div class="flow-content">預購商品<strong>沒有貨到付款，只有提供匯款服務</strong></div>
                </div>
                <div class="flow-warn">
                    <p>● 固定每週三、週六結單；固定每週一出貨</p>
                    <p>● 預購商品追加期約 7-25 工作天，不接受急單</p>
                </div>
            </div>
        </div>

        <div id="acc-root" class="accordion-container"></div>
    </div>

    <script>
        // 1. 手風琴與基本資料
        const data = [
            { 
                title: "優惠", 
                icon: "badge-percent", 
                list: [
                    "關注、分享 Instagram <strong>@aifang_kids</strong> 可獲 <strong>$100 優惠</strong>，只能折抵一次。",
                    "完成取貨，且在 Instagram 分享並 TAG <strong>@aifang_kids</strong> 可獲 <strong>$200 優惠</strong>，每一筆訂單折抵一次。<small>EX: 小璦完成取貨(訂單編號AF123456)，在自己的 Instagram 分享穿搭並 TAG @aifang_kids，同時回饋 LINE 官方，就可獲得 $200 優惠。</small>",
                    "Instagram 不定期分享優惠活動"
                ] 
            },
            { 
                title: "超商取貨說明", 
                icon: "truck", 
                list: [
                    "取貨方式為：<strong>7-11 與 全家</strong>",
                    "取貨時務必攜帶與<strong>收貨人姓名相同的證件</strong>",
                    "固定每週一出貨，若遇國定假日，出貨日將依假日天數<strong>依序往後遞延</strong>",
                    "物流中心理貨與司機配送服務在國定假日會縮減或停班，<strong>實際送達時間會同步延後</strong>"
                ] 
            },
            { 
                title: "商品瑕疵說明", 
                icon: "shield-alert", 
                list: [
                    "收到商品後，請務必<strong>第一時間開箱檢查並錄影</strong>",
                    "若商品有任何問題，請立即通知客服，並提供照片，我們會根據情況，盡力為您妥善處理",
                    "因布料特性、剪裁或車縫方式不同，同尺寸商品可能存在些微的尺寸差異，此屬正常情況，非瑕疵範圍",
                    "1-3cm 尺寸差異與些微線頭屬正常現象",
                    "若遇斷貨將立即通知辦理換款或退款"
                ] 
            },
            { 
                title: "退換貨說明", 
                icon: "refresh-cw", 
                list: [
                    "若需更換尺寸，請確保商品保持<strong>全新狀態（未下水、未剪標）</strong>，並通知客服",
                    "若收到錯誤或缺少的商品，請立即通知客服，將第一時間為您辦理退貨或補寄事宜",
                    "基於衛生考量，<strong>襪子類等貼身衣物售出後，恕無法提供退換貨服務</strong>"
                ] 
            },
            { 
                title: "衣物小提醒", 
                icon: "shirt", 
                list: [
                    "為了保護衣物纖維，延長穿著壽命，建議以<strong>不超過攝氏 40 度的水溫手洗</strong>",
                    "請使用<strong>溫和的中性洗劑</strong>，避免刺激性化學物質傷害布料與寶貝肌膚",
                    "如需機洗，請務必將衣物翻面後<strong>放入洗衣袋</strong>，並選擇柔洗模式，避免過度拉扯與脫水",
                    "深色與淺色衣物請<strong>務必分開洗滌</strong>，以防染色",
                    "<strong>禁止高溫煮洗、使用漂白劑或烘乾機</strong>，以免造成衣物縮水、變形或褪色"
                ] 
            }
        ];

        function toggleAcc(el) {
            const content = el.nextElementSibling;
            const isOpen = content.classList.toggle('active');
            const chevron = el.querySelector('.lucide-chevron-down');
            chevron.style.transform = isOpen ? 'rotate(180deg)' : 'rotate(0deg)';
            chevron.style.transition = '0.3s';
        }

        // ==========================================================================
        // 🌸 2. 核心：沙漏式緩慢飄落粒子引擎
        // ==========================================================================
        const particleImages = [
            './images/ui/01.png',
            './images/ui/02.png',
            './images/ui/03.png',
            './images/ui/04.png',
            './images/ui/05.png'
        ];

        function createParticle() {
            const container = document.getElementById('falling-container');
            if (!container) return;

            const particle = document.createElement('div');
            particle.className = 'particle';

            // 隨機選取 1~5 其中一張圖片
            const randomImg = particleImages[Math.floor(Math.random() * particleImages.length)];
            particle.style.backgroundImage = `url('${randomImg}')`;

            // 隨機尺寸：範圍介於 50px ~ 100px 之間，當作背景精緻不突兀
            const size = Math.random() * 50 + 50;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;

            // 隨機初始水平位置 (0% ~ 100% 視窗寬度)
            particle.style.left = `${Math.random() * 100}vw`;

            // 緩慢下落時間：一條粒子掉落花費 9 ~ 16 秒，營造沙漏、初雪般的慢速感
            const duration = Math.random() * 7 + 9;
            particle.style.animationDuration = `${duration}s`;

            // 物理飄移隨機變數 (利用 CSS Variable 帶入 Keyframes)
            const driftX = (Math.random() * 120) - 60; // 左右飄移 -60px ~ +60px
            const driftRotate = (Math.random() * 360) - 180; // 旋轉角度 -180deg ~ +180deg
            particle.style.setProperty('--drift-x', `${driftX}px`);
            particle.style.setProperty('--drift-rotate', `${driftRotate}deg`);

            container.appendChild(particle);

            // 當該粒子完整播完動畫後，自動從網頁 DOM 移除，確保手機與電腦運作極速順暢
            setTimeout(() => {
                particle.remove();
            }, duration * 1000);
        }

        // 初始化
        function init() {
            // A. 渲染手風琴內容
            const root = document.getElementById('acc-root');
            root.innerHTML = data.map(item => `
                <div class="acc-item">
                    <button onclick="toggleAcc(this)" class="acc-trigger">
                        <div class="acc-icon-wrap">
                            <div class="icon-circle"><i data-lucide="${item.icon}" style="width:16px;height:16px"></i></div>
                            <span>${item.title}</span>
                        </div>
                        <i data-lucide="chevron-down" style="width:18px;color:var(--text-muted)"></i>
                    </button>
                    <div class="acc-content">
                        <ul class="acc-list">${item.list.map(li => `<li>${li}</li>`).join('')}</ul>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();

            // B. 啟動粒子生成器：每 650 毫秒產生一個新的小裝飾圖，密度適中精美
            setInterval(createParticle, 650);
            
            // 先預填幾個，避免一進網頁時上方太空
            for(let i=0; i<8; i++) {
                setTimeout(() => {
                    createParticle();
                }, i * 300);
            }
        }
        
        window.onload = init;
    </script>
</body>
</html>
